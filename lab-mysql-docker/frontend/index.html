<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laboratorio CRUD de Usuarios</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Laboratorio CRUD de Usuarios</h1>
    <button type="button" id="logout-btn" style="display: none; margin: 10px auto; background-color: #6b6257;">Sair (Logout)</button>
  </header>

  <main id="login-view" class="layout" style="justify-content: center;">
    <section class="panel" style="max-width: 400px; text-align: center;">
      <h2>Login</h2>
      <p style="margin-bottom: 20px; color: #6b6257;">Use <strong>admin</strong> e <strong>123456</strong></p>
      <form id="login-form">
        <div class="field" style="text-align: left;">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" name="usuario" required />
        </div>
        <div class="field" style="text-align: left;">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required />
        </div>
        <div class="actions" style="justify-content: center;">
          <button type="submit">Entrar</button>
        </div>
      </form>
      <p id="login-mensagem" class="mensagem" aria-live="polite"></p>
    </section>
  </main>

  <main id="crud-view" class="layout" style="display: none;">
    <section class="panel">
      <h2>Cadastro de Usuario</h2>

      <form id="usuario-form">
        <input type="hidden" id="usuario-id" name="id" />

        <div class="field">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="actions">
          <button type="submit">Salvar</button>
          <button type="button" id="cancelar-edicao">Cancelar edicao</button>
        </div>
      </form>

      <p id="mensagem" class="mensagem" aria-live="polite"></p>
    </section>

    <section class="panel">
      <h2>Usuarios cadastrados</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="usuarios-tabela"></tbody>
        </table>
      </div>
    </section>
  </main>


  <script src="./app.js"></script>
</body>
</html>
